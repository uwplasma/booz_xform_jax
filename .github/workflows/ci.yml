name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  JAX_PLATFORM_NAME: cpu
  MPLBACKEND: Agg

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and test dependencies
        run: python -m pip install .[test]

      - name: Run test suite
        run: pytest -q

      - name: Smoke test installed CLI
        run: |
          mkdir -p /tmp/booz_xform_jax_cli
          cp tests/test_files/booz_in.circular_tokamak /tmp/booz_xform_jax_cli/
          cp tests/test_files/wout_circular_tokamak.nc /tmp/booz_xform_jax_cli/
          cd /tmp/booz_xform_jax_cli
          booz_xform_jax booz_in.circular_tokamak F
          test -f boozmn_circular_tokamak.nc

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package and docs dependencies
        run: python -m pip install .[docs]

      - name: Build documentation with warnings as errors
        run: python -m sphinx -W --keep-going -b html docs docs/_build/html
